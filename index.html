<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>br1te0n | Smart AI Notes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <h1 class="logo">br1te0n</h1>
            <p class="slogan">Real-Time AI Study Assistant<br><span class="kr-text">실시간 AI 학습 도우미</span></p>
        </header>

        <main>
            <div id="setupSection" style="margin-bottom: 20px;">
                <input type="password" id="apiKey" placeholder="Enter Gemini API Key..." style="width: 100%;">
                <p style="font-size: 10px; color: #666; margin-top: 5px;">*Your key is stored locally in your browser.</p>
            </div>

            <div class="input-section">
                <input type="text" id="linkInput" placeholder="Paste link or topic here...">
                <button id="summarizeBtn">Generate Notes / 노트 생성</button>
            </div>

            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p>Gemini is thinking... <br> <span class="kr-text">AI가 분석 중입니다...</span></p>
            </div>

            <div class="notes-section" id="notesSection">
                <h2>Notes for You / 당신을 위한 노트:</h2>
                <div class="paper">
                    <div class="lines"></div>
                    <div class="content" id="notesContent"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        // Import Google Generative AI
        import { GoogleGenerativeAI } from "https://esm.run/@google/genai";

        const summarizeBtn = document.getElementById('summarizeBtn');
        const notesContent = document.getElementById('notesContent');
        const loader = document.getElementById('loader');
        const notesSection = document.getElementById('notesSection');

        summarizeBtn.addEventListener('click', async () => {
            const key = document.getElementById('apiKey').value;
            const promptInput = document.getElementById('linkInput').value;

            if (!key || !promptInput) {
                alert("Please enter both API Key and a Link/Topic!");
                return;
            }

            loader.style.display = 'block';
            notesSection.style.display = 'none';

            try {
                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const prompt = `You are a student assistant. Summarize the following content or link: ${promptInput}. 
                Provide the summary in simple English and then in natural Korean. 
                Use a student-friendly, casual tone. Keep it concise.`;

                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();

                // Format the text to handle line breaks
                notesContent.innerHTML = text.replace(/\n/g, '<br>');
                loader.style.display = 'none';
                notesSection.style.display = 'block';

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
